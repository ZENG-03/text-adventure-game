<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《谜语遗产：七重谜域》</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #d4af37;
            --hover-color: #f1c40f;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, 'Microsoft YaHei';
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 85%;
            max-width: 800px;
            margin-top: 2rem;
            background-color: #222;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow-y: auto;
        }

        #header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        #header h1 {
            color: var(--accent-color);
            margin: 0 0 0.5rem 0;
            text-shadow: 1px 1px 2px #000;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #aaa;
        }

        #story-text {
            flex-grow: 1;
            overflow-y: visible;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 1.1rem;
            padding-right: 10px;
        }

        /* 隐藏滚动条但保留功能 */
        #game-container::-webkit-scrollbar { width: 8px; }
        #game-container::-webkit-scrollbar-track { background: #111; }
        #game-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        #options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px 15px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--hover-color);
            border-color: var(--hover-color);
            transform: translateX(5px);
        }

        .option-btn.disabled, .option-btn:disabled {
            color: #666;
            border-color: #444;
            cursor: not-allowed;
            transform: none;
            background-color: transparent;
        }

        .option-btn.disabled:hover {
            transform: none;
            color: #666;
            border-color: #444;
            background-color: transparent;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-color);
            vertical-align: sub;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #inventory-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2a2a2a;
            border: 2px solid var(--accent-color);
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .sys-btn {
            background: #333;
            border: 1px solid #555;
            color: #ddd;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .sys-btn:hover { background: #444; }

        .system-message {
            color: #88cc88;
            font-style: italic;
            margin-top: 10px;
        }

        .danger-message {
            color: #cc6666;
            font-style: italic;
            margin-top: 10px;
        }
    
        @media screen and (max-width: 600px) {
            #game-container {
                width: 100%;
                margin-top: 0;
                border-radius: 0;
                height: 100vh;
                padding: 10px;
                border: none;
            }
            #inventory-panel {
                width: 100%;
                height: 100vh;
                top: 0;
                left: 100%;
                transform: none;
                transition: left 0.3s ease-in-out;
                border-radius: 0;
            }
            #inventory-panel.open {
                left: 0;
            }
        }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .nav-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .inv-section { margin-bottom: 15px; }
        .empty-text { color: #777; font-style: italic; }
        .inv-item { display: inline-block; background: #333; padding: 4px 8px; margin: 3px; border-radius: 3px; color: #d4d4d4; }
        .badge { display: inline-block; background: var(--accent-color); color: #111; padding: 2px 6px; border-radius: 10px; font-size: 0.8em; margin-left:5px; }
        .achievement { color: #ead67d; font-weight: bold; }
        .medal { color: #cdae3a; font-weight: 100; }
    

        #settings-panel {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #222;
            border: 2px solid var(--accent-color);
            width: 80%;
            max-width: 400px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
        }
        #settings-panel label {
            display: inline-block;
            width: 100px;
        }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
        #item-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: var(--bg-color);
            padding: 25px;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            z-index: 10000;
            color: var(--text-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            text-align: center;
            min-width: 250px;
            max-width: 80%;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #item-modal h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.4em;
            margin-bottom: 15px;
        }
        #item-modal p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        #item-modal button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        #item-modal button:hover {
            background-color: #f1c40f;
        }
</style>
</head>
<body>

    <div id="game-container">
    <!-- 背景图片层 -->
    <div id="scene-background" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; background-size: cover; background-position: center; opacity:0; filter: blur(2px); transition: opacity 0.5s; pointer-events: none;"></div>
    <!-- 原有内容层，加上背景半透明遮罩以保证文字可读 -->
    <div id="game-content" style="position: relative; z-index:1; display: flex; flex-direction: column; height: 100%; width: 100%; background: rgba(34,34,34,0.3);">
        <div id="header" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
        <h1 style="margin:0;">幽暗庄园的秘密</h1>
        <p style="margin:5px 0 0 0;font-size:0.9em;color:#aaa;">探索每个房间，寻找线索，解开谜题</p>
    </div>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="returnToHall()">返回大厅</button>
        <button id="achievement-btn" class="nav-btn" onclick="toggleAchievements()">成就</button>
        <button id="hint-btn" class="nav-btn" onclick="showHint()" style="color:#d4af37;">提示</button>
        <button id="settings-btn" class="nav-btn" onclick="toggleSettings()">设置</button>
            <button id="inventory-btn" class="nav-btn" onclick="toggleInventory()">背包</button>
    </div>
</div>
        <div id="status-bar">
            <span id="location-name">位置：主界面</span>
        </div>

        <div id="story-text">正在加载游戏世界...</div>

        <div id="options-container">
            <!-- 选项会通过JS动态生成这里 -->
        </div>
    </div>

    <!-- 背包遮罩层 -->
    <div class="overlay" id="overlay" onclick="closePanels()"></div>
    <div id="inventory-panel">
        <h2 style="color: var(--accent-color); margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">侦探笔记</h2>
        <div>
            <h3 style="color: #aaa; margin-bottom: 5px;">【已获徽章】 (<span id="medal-count">0</span>/7)</h3>
            <p id="inv-medals" style="margin-top: 0;">无</p>
            
            <h3 style="color: #aaa; margin-bottom: 5px;">【收集道具】</h3>
            <p id="inv-items" style="margin-top: 0;">无</p>
            
            <h3 style="color: #aaa; margin-bottom: 5px;">【掌握线索】</h3>
            <p id="inv-clues" style="margin-top: 0;">无</p>
        </div>
        <button class="sys-btn" style="width: 100%; margin-top: 15px; padding: 10px;" onclick="toggleInventory()">关闭笔记</button>
    </div>

    <div id="achievement-panel">
        <h2 style="color: var(--accent-color); margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">成就墙</h2>
        <div style="margin-bottom: 10px; color: #bbb;">
            已解锁成就：<span id="ach-total">0</span>
            <span style="margin-left: 12px;">结局：<span id="ach-ending-count">0</span></span>
            <span style="margin-left: 12px;">轮回：<span id="ach-ng-count">0</span></span>
        </div>
        <div id="ach-list"><span class="empty-text">暂无成就</span></div>
        <button class="sys-btn" style="width: 100%; margin-top: 15px; padding: 10px;" onclick="toggleAchievements()">关闭成就墙</button>
    </div>

    <!-- 已迁移：场景 DSL JSON -> data/scenes.dsl.json -->

    
    <div id="settings-panel">
        <h2 style="color: var(--accent-color); margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">设置</h2>
        <div style="margin-bottom: 15px;">
            <label>字体大小：</label>
            <input type="range" id="setting-fontsize" min="14" max="24" value="16" oninput="applySettings()">
            <span id="fontsize-val">16px</span>
        </div>
        <div style="margin-bottom: 15px;">
            <label>打字机速度：</label>
            <input type="range" id="setting-typespeed" min="10" max="60" value="25" oninput="applySettings()" step="1">
            <span id="typespeed-val">25ms</span>
        </div>
        <div style="margin-bottom: 15px;">
            <label>关闭动画：</label>
            <input type="checkbox" id="setting-noanim" onchange="applySettings()">
        </div>
        <button class="sys-btn" style="width: 100%; margin-top: 15px; padding: 10px;" onclick="toggleSettings()">关闭设置</button>
    </div>

    <!-- 游戏引擎核心逻辑 (DSL解析器) -->

    <script type="module">
        import { renderScene } from "./js/game-engine.js";
        window.renderScene = renderScene;
        renderScene("title");
    
// --- 自动生成的地下室场景 ---
scenes["basement_entry"] = {
    desc: `地下室的入口位于大厅楼梯下方，一扇沉重的铁门布满锈迹。推开铁门，一股混合着泥土、铁锈和某种古老香料的气味扑面而来。石阶向下延伸，两侧墙壁上的火把在你经过时自动燃起，发出幽蓝的火焰。
地下室是一个宽阔的圆形大厅，穹顶高耸，墙壁上镶嵌着暗色的石砖。房间中央是一座石头祭坛，祭坛表面刻满复杂的符文，中心有一个泪滴形状的凹槽。祭坛周围的地面上，七块石板围成一圈，每块石板上都刻有不同的符文，微微散发着暗红色的光芒。
房间的左侧有一座巨大的熔炉，炉膛早已冰冷，但炉门上刻着火焰纹章。右侧是一张炼金工作台，上面摆满了玻璃器皿、研钵、天平和几本发霉的笔记。工作台后面的架子上，整齐地码放着各种矿石粉末和草药标本。墙壁上还挂着一幅巨大的元素周期表，但上面的符号并非现代化学符号，而是炼金术的古老标志：硫磺、水银、盐，以及七种金属的符号。
你注意到祭坛符文的微光似乎在随着你的呼吸脉动，仿佛活物。管家曾警告：“地下室的谜题关乎转化与平衡，错误的操作可能唤醒不该唤醒的东西。”`,
    options: [
        { text: "检查中央祭坛", target: "basement_altar" },
        { text: "检查熔炉", target: "basement_furnace" },
        { text: "检查炼金工作台", target: "basement_alchemy_table" },
        { text: "研究地面上的七块符文石板", target: "basement_rune_stones" },
        { text: "阅读墙上的元素周期表", target: "basement_periodic_table" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_altar"] = {
    desc: `祭坛由一整块黑色花岗岩雕成，表面被打磨得光滑如镜。中央的泪滴形凹槽深约两指，底部有一个极小的孔洞。祭坛的四个侧面分别刻着四种元素的符号：火、水、土、气，以及一段铭文：“万物皆由四元生，七金乃天地之精。欲启真门，需以生命之露灌之，以七金之魂合之。”
你用手指触摸凹槽，感到一丝温热。凹槽的底部似乎有某种吸力，像是在等待某种液体。你想起之前在其他房间可能获得过“生命之露”（温室谜题的奖励）。如果你已经拥有生命之露，可以直接使用。`,
    options: [
        { text: "", target: "basement_altar" },
        { text: "检查祭坛底部", target: "basement_altar_bottom" },
        { text: "尝试用自己的血液代替", target: "basement_blood_attempt" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_use_dew"] = {
    on_enter: () => {
        let msg = "";
        if(!hasClue("需要七种金属对应的物品（七金之魂）来激活全部符文")) {
            gameState.clues.push("需要七种金属对应的物品（七金之魂）来激活全部符文");
            msg += `<div class="system-message">【获得线索】：需要七种金属对应的物品（七金之魂）来激活全部符文</div>`;
        }
        return msg;
    },
    desc: `你将生命之露缓缓倒入凹槽。液体没有溢出，而是迅速被吸入，凹槽周围亮起柔和的绿光。光芒沿着祭坛表面的纹路扩散，点亮了所有符文，然后流入地面上的七块符文石板。石板依次亮起，但只亮到第五块就停了，第六、第七块依然暗淡。祭坛中央浮现出一行字：“七金之魂缺失，转化无法完成。”`,
    options: [
        { text: "检查熔炉和工作台，寻找七金", target: "basement_search_metals" },
        { text: "查看祭坛是否还有其他机关", target: "basement_altar" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_altar_bottom"] = {
    on_enter: () => {
        let msg = "";
        if(!hasClue("七金对应位置")) {
            gameState.clues.push("七金对应位置");
            msg += `<div class="system-message">【获得线索】：七金对应位置</div>`;
        }
        return msg;
    },
    desc: `你趴下检查祭坛底部。在底座内侧，你发现了一行极小的刻字：“金、银、铜、铁、锡、铅、汞，七金之序，对应七曜。以火锻之，以水淬之，以气凝之，以土固之。” 下面还有一个简图，显示七种金属在祭坛周围的对应位置：金（东）、银（西）、铜（南）、铁（北）、锡（东南）、铅（西北）、汞（中央？但中央是凹槽）。实际上，简图显示祭坛周围的七个符文石板各对应一种金属，需要将相应的金属物品放在石板上。`,
    options: [
        { text: "寻找七种金属物品", target: "basement_search_metals" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_blood_attempt"] = {
    on_enter: () => {
        let msg = "";
        if(!getFlag("祭坛封印（暂时无法使用，需要找到重置方法）")) {
            setFlag("祭坛封印（暂时无法使用，需要找到重置方法）", true);
            msg += `<div class="danger-message">【状态更新】：祭坛封印（暂时无法使用，需要找到重置方法）</div>`;
        }
        return msg;
    },
    desc: `你咬破手指，将几滴血滴入凹槽。鲜血接触凹槽的瞬间，祭坛发出刺目的红光，符文剧烈闪烁，一股强大的斥力将你弹飞，撞在墙上。你感到头晕目眩，祭坛的光芒逐渐暗淡，地面上的符文石板全部熄灭，似乎被暂时封印了。你听见一个苍老的声音在空气中回荡：“汝非吾血，不可妄动。”`,
    options: [
        { text: "探索其他地方寻找重置方法", target: "basement_search_reset" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_alchemy_table"] = {
    desc: `工作台覆盖着一层薄灰，但仪器摆放整齐。你注意到台面上有几样东西值得仔细检查：
- 一本皮革封面的《炼金术士笔记》，书页泛黄，字迹潦草
- 一套玻璃蒸馏装置，连接着各种曲颈瓶
- 一个铜制天平，左右托盘各有一个小碗
- 一个研钵，里面残留着某种黑色粉末
- 一个木架，上面放着七个小瓶子，分别标有七种金属的炼金符号，但大部分是空的，只有“金”和“汞”两个瓶子里还有少量物质`,
    options: [
        { text: "阅读《炼金术士笔记》", target: "basement_read_notes" },
        { text: "检查蒸馏装置", target: "basement_distillation" },
        { text: "检查天平和研钵", target: "basement_balance" },
        { text: "查看七个小瓶子", target: "basement_vials" },
        { text: "--", target: "hall_main" }
    ]
};

scenes["basement_read_notes"] = {
    on_enter: () => {
        let msg = "";
        if(!hasClue("元素调和配方")) {
            gameState.clues.push("元素调和配方");
            msg += `<div class="system-message">【获得线索】：元素调和配方</div>`;
        }
        if(!hasClue("七金之魂需要熔炉炼制")) {
            gameState.clues.push("七金之魂需要熔炉炼制");
            msg += `<div class="system-message">【获得线索】：七金之魂需要熔炉炼制</div>`;
        }
        return msg;
    },
    desc: `笔记的前半部分是炼金术记录，后半部分是日记。你快速翻阅，找到几页关键内容：
